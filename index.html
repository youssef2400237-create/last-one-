<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game vault - Login</title>
    <link rel="stylesheet" href="./styles/login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <video
      autoplay
      muted
      loop
      class="background-video"
      src="./assets/conroller.mp4"
    >
      Your browser does not support the video tag.
    </video>

    <div class="carry_login">
      <form class="login_page" id="loginForm">
        <h1 class="login__header">Welcome to Game Vault</h1>
        <p class="login__subtitle">
          Enter your credentials to access the gaming hub
        </p>

        <div class="carry__email">
          <label for="username">EMAIL:</label>
          <input
            type="email"
            class="inputs"
            placeholder="Enter your email"
            id="username"
            required
          />
        </div>
        <span class="error error-email"></span>

        <div class="carry_password">
          <label for="password">PASSWORD:</label>
          <input
            type="password"
            class="inputs input__password"
            placeholder="Enter your password"
            id="password"
            required
          />
          <i class="fas fa-eye eye__pass"></i>
        </div>
        <span class="error error-password"></span>

        <button type="submit" class="btn">Login</button>

        <div class="login__footer">
          <p>
            Don't have an account?
            <a href="./pages/sign-up.html">Sign up here</a>
          </p>
        </div>
      </form>
    </div>

    <script type="module" src="./scriptes/login.js"></script>
  </body>
</html>
